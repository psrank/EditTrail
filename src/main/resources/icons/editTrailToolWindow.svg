<svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    EditTrail tool-window icon — 13×13 reduction.
    Simplifies the brand-icon trail to a single dot path leading into one
    file glyph so the silhouette survives at IDE-toolbar size.
  -->
  <!-- Trail dots leading into the file -->
  <circle cx="2" cy="6.5" r="0.9" fill="#6E8FCF"/>
  <circle cx="4.5" cy="6.5" r="0.9" fill="#6E8FCF"/>

  <!-- File glyph with folded corner -->
  <path d="M7 2.5 H10.5 L12 4 V10 A0.5 0.5 0 0 1 11.5 10.5 H7 A0.5 0.5 0 0 1 6.5 10 V3 A0.5 0.5 0 0 1 7 2.5 Z"
        stroke="#6E8FCF" stroke-width="1.1" stroke-linejoin="round" fill="none"/>
  <path d="M10.5 2.5 V4 H12" stroke="#6E8FCF" stroke-width="1" stroke-linejoin="round" fill="none"/>
</svg>
