<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    EditTrail brand icon — dark theme.
    Same trail-of-files concept as the light variant; lighter strokes for
    Darcula-readable contrast.
  -->
  <!-- Trail dots / path between file glyphs -->
  <circle cx="11.5" cy="20" r="1.4" fill="#9CB6E8"/>
  <circle cx="15.5" cy="20" r="1.4" fill="#9CB6E8"/>
  <circle cx="19.5" cy="20" r="1.4" fill="#9CB6E8"/>

  <!-- Smallest file glyph (oldest entry in trail) -->
  <path d="M3.5 14 H7.5 L9 15.5 V25 A1 1 0 0 1 8 26 H3.5 A1 1 0 0 1 2.5 25 V15 A1 1 0 0 1 3.5 14 Z"
        stroke="#9CB6E8" stroke-width="1.4" stroke-linejoin="round" fill="none"/>

  <!-- Current file (rightmost, larger) -->
  <path d="M24 11 H32 L36 15 V29 A1.5 1.5 0 0 1 34.5 30.5 H24 A1.5 1.5 0 0 1 22.5 29 V12.5 A1.5 1.5 0 0 1 24 11 Z"
        stroke="#C7D7F2" stroke-width="1.8" stroke-linejoin="round" fill="#2A3550"/>

  <!-- Folded corner of current file -->
  <path d="M32 11 V15 H36" stroke="#C7D7F2" stroke-width="1.6" stroke-linejoin="round" fill="none"/>

  <!-- Two short edit lines on current file -->
  <line x1="26" y1="20" x2="33" y2="20" stroke="#C7D7F2" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="26" y1="24" x2="31" y2="24" stroke="#C7D7F2" stroke-width="1.4" stroke-linecap="round"/>
</svg>
