<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    EditTrail brand icon — light theme.
    Concept: a breadcrumb trail of three connected file glyphs (small, medium,
    full) suggesting recent edit history flowing into the current file.
    The trail reads left-to-right; the rightmost file is the "current" file.
  -->
  <!-- Trail dots / path between file glyphs -->
  <circle cx="11.5" cy="20" r="1.4" fill="#4A6FB3"/>
  <circle cx="15.5" cy="20" r="1.4" fill="#4A6FB3"/>
  <circle cx="19.5" cy="20" r="1.4" fill="#4A6FB3"/>

  <!-- Smallest file glyph (oldest entry in trail) -->
  <path d="M3.5 14 H7.5 L9 15.5 V25 A1 1 0 0 1 8 26 H3.5 A1 1 0 0 1 2.5 25 V15 A1 1 0 0 1 3.5 14 Z"
        stroke="#4A6FB3" stroke-width="1.4" stroke-linejoin="round" fill="none"/>

  <!-- Current file (rightmost, larger) -->
  <path d="M24 11 H32 L36 15 V29 A1.5 1.5 0 0 1 34.5 30.5 H24 A1.5 1.5 0 0 1 22.5 29 V12.5 A1.5 1.5 0 0 1 24 11 Z"
        stroke="#2C4A85" stroke-width="1.8" stroke-linejoin="round" fill="#E8EFFA"/>

  <!-- Folded corner of current file -->
  <path d="M32 11 V15 H36" stroke="#2C4A85" stroke-width="1.6" stroke-linejoin="round" fill="none"/>

  <!-- Two short edit lines on current file -->
  <line x1="26" y1="20" x2="33" y2="20" stroke="#2C4A85" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="26" y1="24" x2="31" y2="24" stroke="#2C4A85" stroke-width="1.4" stroke-linecap="round"/>
</svg>
